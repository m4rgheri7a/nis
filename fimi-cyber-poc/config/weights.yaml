seed: 42

embedding:
  backend: sbert            # sbert | tfidf(폴백)
  model: paraphrase-multilingual-mpnet-base-v2
  chunk_tokens: 220
  chunk_overlap: 40

narrative:
  lambda: 0.6
  top_k: 3

datasets:
  input_mode: combined
  euvsdisinfo:
    max_events: 250          # 로컬 PoC 계산량 제한; null/0/"all"이면 전체 18k 사용
    min_group_size: 2
  curated:
    enabled: true
    events_file: curated_events.jsonl
    iocs_file: real_iocs.csv

ioc_score:
  mu: 0.6                   # I_direct 비중 (논문 미지정, PoC 기본)
  rho: 0.5
  max_path_len: 4
  type_weight: {hash_sha256: 1.0, hash_sha1: 1.0, hash_md5: 1.0, url: 0.9,
                email: 0.8, domain: 0.7, account: 0.6, tg_channel: 0.6,
                ns: 0.5, ipv4: 0.3, asn: 0.2}
  tau_days: {hash_sha256: 365, hash_sha1: 365, hash_md5: 365, url: 180,
             email: 180, domain: 120, account: 120, tg_channel: 120,
             ns: 90, asn: 60, ipv4: 30}

components:
  ttp_sim_mode: mix         # jaccard | overlap | mix
  channel_sim_mode: mix
  tau_event_days: 90

fcls:                       # 논문 3.4 초기값
  alpha_N: 0.30
  beta_I: 0.30
  gamma_D: 0.15
  delta_C: 0.10
  epsilon_T: 0.10
  zeta_A: 0.05              # 평가 시 코드가 0으로 강제 (allow_actor=False)
  min_evidence_components: 2 # E3: N-only collapse 방지
  insufficient_evidence_penalty: 0.35
  coverage_penalty_power: 0.7
  n_only_cap: 0.45
  n_conf_min_tokens: 12
  n_conf_full_tokens: 45

priority:
  theta: {link: 0.35, impact: 0.15, evidence: 0.15, cyber: 0.20, urgency: 0.15}
  impact_default: 0.5

attribution:
  enabled: true
  taxonomy_file: actor_taxonomy.csv
  temporal_only: true        # query보다 먼저 관측된 reference event만 사용
  min_actor_history: 2
  top_k_reference_events: 3
  top_k_candidates: 3
  excluded_labels: ["unknown", "unattributed", "not attributed", "n/a", "none"]
  support_threshold: 0.20
  coverage_penalty_power: 0.70
  calibration:
    enabled: true
    fraction: 0.60
    min_temperature: 0.02
    max_temperature: 2.0
    grid_points: 80
  abstention:
    confidence_threshold: 0.55
    margin_threshold: 0.03
    min_evidence_families: 2
  bootstrap_iters: 500
  external_case:
    enabled: true
    events_file: ghostwriter_events.jsonl
    iocs_file: ghostwriter_iocs.csv
  generalization_benchmark:
    enabled: true
    protocol_file: generalization_protocol.yaml
    events_files: [ghostwriter_events.jsonl, multiactor_events.jsonl]
    iocs_files: [ghostwriter_iocs.csv, multiactor_iocs.csv]
  temperature: 0.15          # 후보 간 softmax 확률 보정값
  weights:
    narrative: 0.25
    infrastructure: 0.30     # 실제 IOC(I_no_synthetic)만 사용
    ttp: 0.20
    channel: 0.10
    temporal: 0.05
    target: 0.10
  confidence:
    min_evidence_families: 2
    no_real_ioc_cap: 0.70
    single_source_cap: 0.60
    insufficient_evidence_cap: 0.45
    moderate_threshold: 0.55
    strong_threshold: 0.75

eval:
  p_at: [1, 3, 5]
  ndcg_at: 10
  bootstrap_iters: 50
  grid_alpha: [0.2, 0.3, 0.4]
  grid_beta:  [0.2, 0.3, 0.4]

